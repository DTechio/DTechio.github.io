<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Uma dica curta de português por dia, com explicações simples e exemplos práticos."
    />
    <title>Português Diário</title>
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-shell" aria-labelledby="tip-title">
      <section class="tip-panel" aria-live="polite">
        <p class="eyebrow" id="tip-date">Dica de hoje</p>
        <p class="category" id="tip-category">Carregando...</p>
        <h1 id="tip-title">Português Diário</h1>
        <p class="tip-content" id="tip-content">
          Preparando uma dica rápida para deixar seu português mais claro.
        </p>
        <div class="examples" id="examples" hidden></div>
      </section>
    </main>

    <footer class="site-footer">
      <nav class="footer-links" aria-label="Links do site">
        <span class="future-link" title="Recurso futuro">Sugerir uma dica</span>
        <span class="future-link" title="Área administrativa futura">ADM</span>
      </nav>
      <a
        class="mobile-support-link"
        href="https://www.buymeacoffee.com/dtechio"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Apoiar o projeto no Buy me a coffee"
      >
        <img src="assets/buy-me-a-coffee-icon.svg" alt="" aria-hidden="true" />
        <span>Buy me a coffee</span>
      </a>
    </footer>

    <script src="tips.js"></script>
    <script src="script.js"></script>
    <script
      data-name="BMC-Widget"
      data-cfasync="false"
      src="https://cdnjs.buymeacoffee.com/1.0.0/widget.prod.min.js"
      data-id="DTechio"
      data-description="Support me on Buy me a coffee!"
      data-message="Gostou da dica? Apoie o projeto!"
      data-color="#5F7FFF"
      data-position="Right"
      data-x_margin="18"
      data-y_margin="18"
    ></script>
  </body>
</html>

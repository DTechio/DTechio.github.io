<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>ADM | Português Diário</title>
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" />
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <main class="page-shell admin-shell" aria-labelledby="admin-title">
      <section class="tip-panel admin-panel">
        <p class="eyebrow">Área reservada</p>
        <h1 id="admin-title">ADM</h1>

        <form class="suggestion-form admin-login" id="admin-login-form">
          <div class="form-field">
            <label for="admin-email">E-mail</label>
            <input id="admin-email" name="email" type="email" autocomplete="email" required />
          </div>

          <div class="form-field">
            <label for="admin-password">Senha</label>
            <input
              id="admin-password"
              name="password"
              type="password"
              autocomplete="current-password"
              required
            />
          </div>

          <button class="submit-button" type="submit">Entrar</button>
          <p class="form-status" id="admin-login-status" role="status" aria-live="polite"></p>
        </form>

        <section class="admin-dashboard" id="admin-dashboard" hidden>
          <div class="admin-toolbar">
            <div>
              <p class="admin-kicker">Logado como</p>
              <p class="admin-user" id="admin-user">Administrador</p>
            </div>
            <div class="admin-actions">
              <button class="text-button" id="refresh-admin" type="button">Atualizar</button>
              <button class="text-button" id="logout-button" type="button">Sair</button>
            </div>
          </div>

          <div class="admin-tabs" role="tablist" aria-label="Área administrativa">
            <button class="admin-tab is-active" data-admin-tab="suggestions" type="button">
              Sugestões
            </button>
            <button class="admin-tab" data-admin-tab="tips" type="button">Dicas</button>
          </div>

          <section class="admin-tab-panel" id="suggestions-panel">
            <div class="admin-filter">
              <label for="suggestion-search">Buscar</label>
              <input id="suggestion-search" type="search" placeholder="Título da sugestão" />
            </div>
            <div class="suggestions-list" id="suggestions-list"></div>
          </section>

          <section class="admin-tab-panel" id="tips-panel" hidden>
            <div class="admin-filter">
              <label for="tip-status-filter">Status</label>
              <select id="tip-status-filter">
                <option value="draft">Draft</option>
                <option value="active">Active</option>
                <option value="inactive">Inactive</option>
              </select>
              <label for="tip-search">Buscar</label>
              <input id="tip-search" type="search" placeholder="Título da dica" />
              <button class="submit-button compact-button new-tip-button" id="toggle-new-tip" type="button">
                Nova dica manual
              </button>
            </div>

            <form class="admin-tip-form new-tip-form" id="new-tip-form" hidden>
              <div class="form-grid">
                <div class="form-field">
                  <label for="new-tip-title">Título</label>
                  <input id="new-tip-title" name="title" type="text" required />
                </div>

                <div class="form-field">
                  <label for="new-tip-category">Categoria</label>
                  <select id="new-tip-category" name="category_id" required></select>
                </div>
              </div>

              <div class="form-field">
                <label for="new-tip-content">Explicação</label>
                <textarea id="new-tip-content" name="content" rows="4" required></textarea>
              </div>

              <div class="form-field">
                <label for="new-tip-example">Exemplo</label>
                <input id="new-tip-example" name="example" type="text" />
              </div>

              <div class="form-field">
                <label for="new-tip-example2">Outro exemplo</label>
                <input id="new-tip-example2" name="example2" type="text" />
              </div>

              <div class="suggestion-actions">
                <button class="submit-button compact-button" type="submit">Salvar como draft</button>
                <button class="text-button" id="cancel-new-tip" type="button">Cancelar</button>
              </div>
            </form>

            <div class="suggestions-list" id="tips-list"></div>
          </section>

          <p class="form-status" id="admin-status" role="status" aria-live="polite"></p>
        </section>
      </section>
    </main>

    <footer class="site-footer">
      <nav class="footer-links" aria-label="Links do site">
        <a class="suggestion-link" href="../" aria-label="Voltar para a dica do dia">
          Voltar para dica
        </a>
      </nav>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../admin.js"></script>
  </body>
</html>
